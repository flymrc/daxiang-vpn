openapi: 3.1.0
info:
  title: Zongheng Hub Admin API
  version: 0.1.0
servers:
  - url: /admin/api
paths:
  /auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /auth/logout:
    post:
      operationId: logout
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Logged out.
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /auth/me:
    get:
      operationId: getAuthMe
      responses:
        '200':
          description: Current admin session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/Error'
  /health:
    get:
      operationId: getAdminHealth
      responses:
        '200':
          description: Admin service health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /overview:
    get:
      operationId: getOverview
      responses:
        '200':
          description: Hub overview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewResponse'
        '401':
          $ref: '#/components/responses/Error'
  /tokens:
    get:
      operationId: listTokens
      responses:
        '200':
          description: Token list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        '401':
          $ref: '#/components/responses/Error'
  /tokens/{token_id}/secret:
    get:
      operationId: revealTokenSecret
      parameters:
        - in: path
          name: token_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Revealed token value for an authenticated admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenSecretResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /leases:
    get:
      operationId: listLeases
      responses:
        '200':
          description: Active token leases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeasesResponse'
        '401':
          $ref: '#/components/responses/Error'
  /egress:
    get:
      operationId: listEgress
      responses:
        '200':
          description: Egress node status list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressResponse'
        '401':
          $ref: '#/components/responses/Error'
  /egress/{egress_id}/exit-ip:
    get:
      operationId: revealEgressExitIP
      parameters:
        - in: path
          name: egress_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current public exit IP measured through the egress proxy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EgressExitIPResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
  /events:
    get:
      operationId: listEvents
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Audit events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsResponse'
        '401':
          $ref: '#/components/responses/Error'
  /egress/{egress_id}/rotate-ip:
    post:
      operationId: rotateEgressIP
      parameters:
        - in: path
          name: egress_id
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateIPRequest'
      responses:
        '200':
          description: Rotate request dispatched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateIPResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          description: Egress is already rotating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateIPResponse'
components:
  parameters:
    CsrfToken:
      in: header
      name: X-CSRF-Token
      required: true
      schema:
        type: string
  responses:
    Error:
      description: JSON error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    AuthMeResponse:
      type: object
      required: [username, csrf_token, expires_at]
      properties:
        username:
          type: string
        csrf_token:
          type: string
        expires_at:
          type: string
          format: date-time
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
    OverviewResponse:
      type: object
      required: [hub, stats, updated_at]
      properties:
        hub:
          $ref: '#/components/schemas/HubInfo'
        stats:
          $ref: '#/components/schemas/OverviewStats'
        updated_at:
          type: string
          format: date-time
    HubInfo:
      type: object
      required: [public_ip, wg_ip, version, uptime_seconds]
      properties:
        public_ip:
          type: string
        wg_ip:
          type: string
        version:
          type: string
        uptime_seconds:
          type: integer
          format: int64
    OverviewStats:
      type: object
      required: [token_count, enabled_token_count, active_lease_count, egress_online_count, rotate_today_count]
      properties:
        token_count:
          type: integer
        enabled_token_count:
          type: integer
        active_lease_count:
          type: integer
        egress_online_count:
          type: integer
        rotate_today_count:
          type: integer
    TokensResponse:
      type: object
      required: [tokens]
      properties:
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/TokenSummary'
    TokenSummary:
      type: object
      required: [id, masked_token, client_name, enabled, status, egress_id, egress_name, wg_address, expires_at, last_active_at]
      properties:
        id:
          type: string
        masked_token:
          type: string
        client_name:
          type: string
        enabled:
          type: boolean
        status:
          type: string
          enum: [enabled, disabled, expiring, expired]
        egress_id:
          type: string
        egress_name:
          type: string
        wg_address:
          type: string
        expires_at:
          type: string
          nullable: true
        last_active_at:
          type: string
          format: date-time
          nullable: true
    TokenSecretResponse:
      type: object
      required: [id, token]
      properties:
        id:
          type: string
        token:
          type: string
    LeasesResponse:
      type: object
      required: [leases]
      properties:
        leases:
          type: array
          items:
            $ref: '#/components/schemas/LeaseSummary'
    LeaseSummary:
      type: object
      required: [token_id, masked_token, client_name, source_ip, egress_id, seen_at, expires_at]
      properties:
        token_id:
          type: string
        masked_token:
          type: string
        client_name:
          type: string
        source_ip:
          type: string
        egress_id:
          type: string
        seen_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
    EgressResponse:
      type: object
      required: [egress]
      properties:
        egress:
          type: array
          items:
            $ref: '#/components/schemas/EgressSummary'
    EgressSummary:
      type: object
      required: [id, display_name, region, type, management_addr, proxy_addr, status]
      properties:
        id:
          type: string
        display_name:
          type: string
        region:
          type: string
        type:
          type: string
        management_addr:
          type: string
        proxy_addr:
          type: string
        status:
          type: string
          enum: [online, degraded, offline, deprecated]
        session_count:
          type: integer
        active_connections:
          type: integer
        rotate_lock_until:
          type: string
          format: date-time
          nullable: true
        raw_health:
          type: object
          additionalProperties: true
          nullable: true
    EgressExitIPResponse:
      type: object
      required: [egress_id, exit_ip, checked_at]
      properties:
        egress_id:
          type: string
        exit_ip:
          type: string
        ipv4:
          type: string
        ipv6:
          type: string
        checked_at:
          type: string
          format: date-time
    EventsResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
    AuditEvent:
      type: object
      required: [id, occurred_at, actor, source_ip, event_type, target, result]
      properties:
        id:
          type: integer
          format: int64
        occurred_at:
          type: string
          format: date-time
        actor:
          type: string
        source_ip:
          type: string
        event_type:
          type: string
        target:
          type: string
        detail:
          type: object
          additionalProperties: true
          nullable: true
        result:
          type: string
        error_code:
          type: string
          nullable: true
    RotateIPRequest:
      type: object
      properties:
        down_seconds:
          type: integer
          minimum: 1
          maximum: 60
          default: 8
    RotateIPResponse:
      type: object
      required: [status, egress_id, down_seconds]
      properties:
        status:
          type: string
          enum: [triggered, busy]
        egress_id:
          type: string
        down_seconds:
          type: integer
        retry_after_seconds:
          type: integer
        message:
          type: string
